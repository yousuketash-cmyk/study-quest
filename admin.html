<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>スタディクエスト 見守り画面</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<style>
  *{box-sizing:border-box;}
  body{margin:0; font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Meiryo",sans-serif;
    background:linear-gradient(160deg,#1b2a6b,#3b1f7a); min-height:100vh; color:#243b53;}
  #wrap{max-width:560px; margin:0 auto; padding:20px 14px 60px;}
  h1{color:#fff; font-size:20px; text-align:center; margin:14px 0 2px;}
  .sub{color:#fff; opacity:.7; text-align:center; font-size:12px; margin-bottom:18px;}
  .card{background:#fff; border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:0 4px 14px rgba(0,0,0,.18);}
  .in{width:100%; font-size:16px; padding:12px; border:2px solid #cbd5e1; border-radius:12px; margin-bottom:10px; font-family:inherit;}
  .btn{width:100%; font-size:16px; font-weight:800; padding:13px; border:none; border-radius:12px; color:#fff;
    background:linear-gradient(135deg,#ff8a1e,#f0640c); cursor:pointer;}
  .hint{color:#ef4444; font-size:12px; font-weight:800; min-height:16px; margin-bottom:6px;}
  .kname{font-size:17px; font-weight:800;}
  .meta{font-size:12px; color:#829ab1; margin-top:2px;}
  .tiles{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:12px 0;}
  .tile{background:#f0f4f8; border-radius:10px; padding:8px 4px; text-align:center;}
  .tv{font-size:16px; font-weight:800;}
  .tl{font-size:10px; color:#829ab1;}
  .sec{font-size:12px; font-weight:800; color:#829ab1; margin:12px 0 6px;}
  .bar{display:flex; align-items:center; gap:8px; margin:4px 0; font-size:12px;}
  .bar .nm{width:110px; flex-shrink:0;}
  .bar .tr{flex:1; background:#e2e8f0; border-radius:6px; height:12px; overflow:hidden;}
  .bar .fl{height:100%; border-radius:6px;}
  .bar .pc{width:86px; text-align:right; color:#627d98; flex-shrink:0;}
  .days{display:flex; gap:4px; align-items:flex-end; height:46px; margin-top:6px;}
  .day{flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; gap:2px;}
  .day .b{width:100%; background:linear-gradient(180deg,#60a5fa,#2563eb); border-radius:3px 3px 0 0; min-height:2px;}
  .day .d{font-size:9px; color:#829ab1;}
  .note{font-size:11px; color:#94a3b8; margin-top:10px; line-height:1.6;}
  .err{color:#fff; background:#ef4444; border-radius:10px; padding:10px; font-size:13px; font-weight:800; text-align:center;}
</style>
</head>
<body>
<div id="wrap">
  <h1>📊 スタディクエスト 見守り画面</h1>
  <div class="sub">おうちの人用：かぞく全員の きろくを 一覧で</div>

  <div class="card" id="loginCard">
    <input class="in" id="code" placeholder="あいことば" autocomplete="off">
    <input class="in" id="pin" type="password" placeholder="おうちのひと用ばんごう" autocomplete="off">
    <div class="hint" id="hint"></div>
    <button class="btn" onclick="load()">ひらく</button>
  </div>

  <div id="result"></div>
</div>

<!-- 問題データの倉庫（単元の名前と順序を流用する。読み込み順は index.html と同じ） -->
<script src="data/pack-g1.js"></script>
<script src="data/pack-g2.js"></script>
<script src="data/pack-g3.js"></script>
<script src="data/pack-g4.js"></script>
<script src="data/subjects-g4.js"></script>
<script src="data/pack-g5.js"></script>
<script src="data/subjects-g5.js"></script>
<script src="data/dokkai-g5.js"></script>
<script src="data/pack-g6.js"></script>
<script src="data/subjects-extra.js"></script>
<script src="data/advanced.js"></script>
<script src="data/dokkai.js"></script>
<script src="data/book-kawaguchi.js"></script>
<script>
const CLOUD_URL="https://vcrsoxekorhgcpicexjl.supabase.co";
const CLOUD_KEY="sb_publishable_ZcBgiM-YOdHMnSjd3_xY6w_zoS8f6uE";
const CAT_LABEL={add:"たしざん", sub:"ひきざん", mul:"かけざん", div:"わりざん",
  kanji:"かんじの よみ", okuri:"おくりがな", kaki:"かんじの かきとり",
  toki:"時間・時こく", tani:"たんい(長さ・重さ)", big:"大きい数", amari:"あまりのわり算",
  frac:"ぶんすう", dec:"しょうすう", box:"□を使った式", bai:"なんばい", zu:"ずけい",
  bun:"文章もんだい", kazu:"かず・ばんめ", kurabe:"くらべかた", moji:"もじあつめ",
  shiki:"文字と式", baai:"場合の数", hi:"比", hirei:"比例・反比例", data:"データ・平均",
  wariai:"わりあい", sokudo:"速さ", seisu:"整数の せいしつ",
  seiji:"政治とくらし", rekishi:"歴史", kokusai:"世界の中の日本",
  seimei:"生命（体・植物）", busshitsu:"もの・水よう液", chikyu:"地球（月・大地）", energy:"エネルギー（てこ・電気）",
  eigo:"えいご", chiiki:"まちと市", kurashi:"はたらく人", anzen:"安全を守る", dokkai:"よみとり"};
const COURSE_NAME={dragon:"ドラゴンコース", sky:"そらコース", sea:"うみコース"};
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
async function rpc(fn, args){
  const res=await fetch(CLOUD_URL+"/rest/v1/rpc/"+fn,{
    method:"POST",
    headers:{"Content-Type":"application/json","apikey":CLOUD_KEY,"Authorization":"Bearer "+CLOUD_KEY},
    body:JSON.stringify(args)});
  if(!res.ok) throw new Error(fn+" "+res.status);
  const t=await res.text();
  return t?JSON.parse(t):null;
}
function accColor(a){ return a>=0.8?"#22c55e":(a>=0.6?"#f59e0b":"#ef4444"); }
function ymdOf(dt){ return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }

async function load(){
  const code=document.getElementById("code").value.trim();
  const pin=document.getElementById("pin").value.trim();
  const hint=document.getElementById("hint");
  if(!code||!pin){ hint.textContent="あいことばと ばんごうの 両方を 入れてください"; return; }
  hint.textContent="よみこみ中…";
  let rows=null;
  try{ rows=await rpc("sq_admin_overview",{p_code:code, p_pin:pin}); }
  catch(e){ hint.textContent="つながりませんでした（電波・設定をご確認ください）"; return; }
  if(rows===null){ hint.textContent="あいことば か ばんごうが ちがいます"; return; }
  /* 日別倉庫（save_days）：logが3,000問で消えても残る長期の記録。取れなくても画面は出す */
  let dayRows=null;
  try{ dayRows=await rpc("sq_admin_days",{p_code:code, p_pin:pin}); }catch(e){ dayRows=null; }
  hint.textContent="";
  render(rows, dayRows||[]);
}

/* ===== 単元ごとの すすみぐあい（実際に解いた記録から。カレンダー判定はしない） ===== */
function unitListsFor(d){
  const grade=d.grade||3;
  const packs={
    1:{math:MATH_UNITS_G1},
    2:{math:MATH_UNITS_G2},
    3:{math:MATH_UNITS_G3, sci:SCI_UNITS_G3, soc:SOC_UNITS_G3, eng:ENG_UNITS_G3},
    4:{math:MATH_UNITS_G4, sci:SCI_UNITS_G4, soc:SOC_UNITS_G4, eng:ENG_UNITS_G4},
    5:{math:MATH_UNITS_G5, sci:SCI_UNITS_G5, soc:SOC_UNITS_G5, eng:ENG_UNITS_G5},
    6:{math:MATH_UNITS_G6, sci:SCI_UNITS_G6, soc:SOC_UNITS_G6, eng:ENG_UNITS_G6},
  };
  const p=Object.assign({}, packs[grade]||packs[3]);
  /* 教科書セット（かわぐち等）：単元カレンダーの差しかえを ゲームと同じに再現 */
  const bp=(typeof BOOK_PACKS!=="undefined" && BOOK_PACKS[d.book] ? BOOK_PACKS[d.book] : {})[grade];
  if(bp){ if(bp.mathUnits) p.math=bp.mathUnits; if(bp.sciUnits) p.sci=bp.sciUnits; if(bp.socUnits) p.soc=bp.socUnits; }
  return [
    {label:"🔢 算数",   sub:"math",    units:p.math},
    {label:"🔬 理科",   sub:"science", units:p.sci},
    {label:"🗺️ 社会",   sub:"social",  units:p.soc},
    {label:"🔤 えいご", sub:"english", units:p.eng},
  ].filter(x=>x.units && x.units.length);
}
/* ゲーム内「きろくルーム」と同じランク式（正解×2−まちがい を 8ポイントで1ランク） */
function unitRankOf(a){ const pts=Math.max(0, a.ok*2-(a.n-a.ok)); return Math.min(20, 1+Math.floor(pts/8)); }
function rankBadge(r){ return r>=20?"👑":r>=15?"💎":r>=10?"🥇":r>=5?"🥈":"🥉"; }
function unitProgressHtml(d){
  const agg={};
  (d.log||[]).forEach(e=>{ if(!e.u) return; const k=e.sub+"|"+e.u; (agg[k]=agg[k]||{n:0,ok:0}); agg[k].n++; agg[k].ok+=e.ok?1:0; });
  let html="";
  unitListsFor(d).forEach(sec=>{
    let rows="", started=0;
    sec.units.forEach(u=>{
      const a=agg[sec.sub+"|"+u.id];
      if(a){
        started++;
        const acc=a.ok/a.n, r=unitRankOf(a);
        rows+=`<div class="bar"><div class="nm" style="width:170px;">${rankBadge(r)} ${esc(u.name)}</div>
          <div class="tr"><div class="fl" style="width:${Math.round(acc*100)}%; background:${accColor(acc)};"></div></div>
          <div class="pc" style="width:110px;">${Math.round(acc*100)}%・${a.n}問・R${r}</div></div>`;
      }else{
        rows+=`<div class="bar" style="opacity:.4;"><div class="nm" style="width:170px;">・ ${esc(u.name)}</div>
          <div class="tr"></div><div class="pc" style="width:110px;">まだ</div></div>`;
      }
    });
    html+=`<details style="margin-top:6px;"><summary style="font-size:13px; font-weight:800; color:#486581; cursor:pointer;">
      ${sec.label}　きろくのある単元 ${started}/${sec.units.length}</summary><div style="margin-top:6px;">${rows}</div></details>`;
  });
  if(!html) return '<div class="meta">この学年は 単元の記録が ありません</div>';
  return html+'<div class="meta" style="margin-top:4px;">※本体に残っている記録（直近3,000問）から計算。国語は単元の記録がないため 分野別で見てください</div>';
}

/* ===== せいちょうの きろく（日別倉庫から） ===== */
function weekKey(dstr){ /* その週の月曜の日付（週ごとにまとめる用） */
  const dt=new Date(dstr+"T00:00:00");
  dt.setDate(dt.getDate()-((dt.getDay()+6)%7));
  return ymdOf(dt);
}
function growthHtml(myDays){
  if(!myDays.length) return '<div class="meta">クラウドに きろくが たまると、週ごとの のびが ここに出ます</div>';
  /* 週ごとの正解率（直近8週） */
  const wk={};
  myDays.forEach(x=>{ const k=weekKey(x.d); (wk[k]=wk[k]||{n:0,ok:0}); wk[k].n+=(+x.n||0); wk[k].ok+=(+x.ok||0); });
  let html="";
  Object.keys(wk).sort().slice(-8).forEach(k=>{
    const w=wk[k]; if(!w.n) return;
    const acc=w.ok/w.n;
    const dt=new Date(k+"T00:00:00");
    html+=`<div class="bar"><div class="nm">${(dt.getMonth()+1)}/${dt.getDate()}の週</div>
      <div class="tr"><div class="fl" style="width:${Math.round(acc*100)}%; background:${accColor(acc)};"></div></div>
      <div class="pc">${Math.round(acc*100)}%（${w.n}問）</div></div>`;
  });
  /* 分野別ののび：さいきん2週間 と それより前 をくらべる（両方8問以上の分野だけ） */
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-14);
  const cut=ymdOf(cutoff);
  const before={}, recent={}; let rn=0, rok=0;
  myDays.forEach(x=>{
    (x.cats||[]).forEach(c=>{
      rn+=(+c.rn||0); rok+=(+c.rok||0);
      const tgt=(x.d>=cut)?recent:before;
      (tgt[c.cat]=tgt[c.cat]||{n:0,ok:0}); tgt[c.cat].n+=(+c.n||0); tgt[c.cat].ok+=(+c.ok||0);
    });
  });
  const moves=[];
  Object.keys(recent).forEach(k=>{
    const b=before[k], rc=recent[k];
    if(b && b.n>=8 && rc.n>=8) moves.push({k:k, diff:rc.ok/rc.n-b.ok/b.n, acc:rc.ok/rc.n});
  });
  if(moves.length){
    moves.sort((a,b)=>b.diff-a.diff);
    html+='<div class="sec">分野別の のび（さいきん2週間 と そのまえ）</div>';
    moves.slice(0,6).forEach(m=>{
      const pt=Math.round(m.diff*100);
      const mark=pt>=3?"▲":(pt<=-3?"▼":"→");
      const col=pt>=3?"#22c55e":(pt<=-3?"#ef4444":"#94a3b8");
      html+=`<div class="bar"><div class="nm">${esc(CAT_LABEL[m.k]||m.k)}</div>
        <div class="tr"><div class="fl" style="width:${Math.round(m.acc*100)}%; background:${accColor(m.acc)};"></div></div>
        <div class="pc" style="color:${col}; font-weight:800;">${mark}${pt>0?"+":""}${pt}%</div></div>`;
    });
  }else{
    html+='<div class="meta">記録が2週間ぶん以上たまると、分野別の のびが 出ます</div>';
  }
  /* まちがいなおし（🔁復習）の成功りつ＝定着の見立て */
  if(rn>=5){
    const racc=Math.round(rok/rn*100);
    html+=`<div class="meta" style="margin-top:8px;">🔁 まちがいなおしの せいこうりつ：<b style="color:${accColor(rok/rn)};">${racc}%</b>（一度まちがえた問題 ${rn}回中 ${rok}回 正解＝おぼえなおす力の目安）</div>`;
  }else{
    html+='<div class="meta" style="margin-top:8px;">🔁 まちがいなおしの きろくは これから たまります（一度まちがえた問題を 次に正解できたか＝定着の目安）</div>';
  }
  return html;
}

function render(rows, dayRows){
  const out=document.getElementById("result");
  if(!rows.length){ out.innerHTML='<div class="card">まだ プレイヤーが いません。ゲーム側で「あたらしく はじめる」をすると ここに出ます。</div>'; return; }
  let html="";
  rows.forEach(r=>{
    const d=r.data||{};
    const log=d.log||[];
    const totalOk=log.reduce((s,e)=>s+(e.ok?1:0),0);
    const acc=log.length?Math.round(totalOk/log.length*100):null;
    const last=r.updated_at?new Date(r.updated_at):null;
    const lastStr=last?(ymdOf(last)+" "+String(last.getHours()).padStart(2,"0")+":"+String(last.getMinutes()).padStart(2,"0")):"（まだ記録なし）";
    // 学習時間（バトルごとの記録 sessions を日別に集計）
    const minsBy={};
    (d.sessions||[]).forEach(s=>{ if(s.d) minsBy[s.d]=(minsBy[s.d]||0)+(+s.mins||0); });
    const todayStr=ymdOf(new Date());
    const minsToday=Math.round(minsBy[todayStr]||0);
    // 1問あたりの平均回答時間（秒）
    const msList=log.filter(e=>e.ms>0);
    const avgSec=msList.length?(msList.reduce((s,e)=>s+e.ms,0)/msList.length/1000):null;
    // 直近7日の学習量
    const days=[]; const now=new Date();
    for(let i=6;i>=0;i--){ const dt=new Date(now); dt.setDate(now.getDate()-i); days.push({d:ymdOf(dt), label:(dt.getMonth()+1)+"/"+dt.getDate(), n:0}); }
    log.forEach(e=>{ const hit=days.find(x=>x.d===e.d); if(hit) hit.n++; });
    const maxN=Math.max(1,...days.map(x=>x.n));
    const total7n=days.reduce((s,x)=>s+x.n,0);
    const total7m=Math.round(days.reduce((s,x)=>s+(minsBy[x.d]||0),0));
    const daysHtml=days.map(x=>`<div class="day"><div class="b" style="height:${Math.round(x.n/maxN*34)+2}px; opacity:${x.n?1:.15};"></div><div class="d">${x.label}</div></div>`).join("");
    // 分野別（10問以上の分野のみ・正解率順）
    const agg={};
    log.forEach(e=>{ (agg[e.cat]=agg[e.cat]||{n:0,ok:0}); agg[e.cat].n++; agg[e.cat].ok+=e.ok?1:0; });
    const cats=Object.keys(agg).map(k=>({k:k,n:agg[k].n,acc:agg[k].ok/agg[k].n})).filter(c=>c.n>=5).sort((a,b)=>b.acc-a.acc);
    const catHtml=cats.map(c=>`<div class="bar"><div class="nm">${esc(CAT_LABEL[c.k]||c.k)}</div>
      <div class="tr"><div class="fl" style="width:${Math.round(c.acc*100)}%; background:${accColor(c.acc)};"></div></div>
      <div class="pc">${Math.round(c.acc*100)}%（${c.n}問）</div></div>`).join("") || '<div class="meta">記録が たまると 分野別の 得意・にがてが 出ます（各5問から）</div>';
    html+=`<div class="card">
      <div class="kname">👤 ${esc(r.name)}</div>
      <div class="meta">さいごに あそんだ：${lastStr}　／　${d.grade?d.grade+"年生":""}　${esc(COURSE_NAME[d.course]||"")}</div>
      <div class="tiles">
        <div class="tile"><div class="tv">Lv.${d.lv||1}</div><div class="tl">レベル</div></div>
        <div class="tile"><div class="tv">${d.total||0}</div><div class="tl">といた問題</div></div>
        <div class="tile"><div class="tv">${acc===null?"−":acc+"%"}</div><div class="tl">正解率</div></div>
        <div class="tile"><div class="tv">${d.loginDays||0}日</div><div class="tl">あそんだ日数</div></div>
        <div class="tile"><div class="tv">${minsToday}分</div><div class="tl">きょうの時間</div></div>
        <div class="tile"><div class="tv">${total7m}分</div><div class="tl">7日間の時間</div></div>
        <div class="tile"><div class="tv">${avgSec===null?"−":avgSec.toFixed(1)+"秒"}</div><div class="tl">1問あたり</div></div>
        <div class="tile"><div class="tv">${d.loginStreak||0}日</div><div class="tl">れんぞく</div></div>
      </div>
      <div class="sec">この7日間の 学習量（問題数）</div>
      <div class="days">${daysHtml}</div>
      <div class="meta" style="text-align:right;">この7日間の合計：${total7n}問・${total7m}分</div>
      <div class="sec">分野別の せいかいりつ</div>
      ${catHtml}
      <div class="sec">単元ごとの すすみぐあい</div>
      ${unitProgressHtml(d)}
      <div class="sec">せいちょうの きろく（週ごとの せいかいりつ）</div>
      ${growthHtml((dayRows||[]).filter(x=>x.player_id===r.id).sort((a,b)=>a.d<b.d?-1:1))}
      <div class="note">くわしい分析（集中の続き方・時間帯・気づきのまとめ）は、ゲーム内の「おうちの人へ」で本人のプレイヤーを開くと見られます。この画面は閲覧専用で、記録には影響しません。</div>
    </div>`;
  });
  out.innerHTML=html;
}
document.getElementById("pin").addEventListener("keydown",e=>{ if(e.key==="Enter") load(); });
</script>
</body>
</html>
