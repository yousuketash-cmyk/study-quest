<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>スタディクエスト 学年べつ平均（管理人用）</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
<style>
  *{box-sizing:border-box;}
  body{margin:0; font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Meiryo",sans-serif;
    background:linear-gradient(160deg,#0f3d2e,#1b2a6b); min-height:100vh; color:#243b53;}
  #wrap{max-width:560px; margin:0 auto; padding:20px 14px 60px;}
  h1{color:#fff; font-size:20px; text-align:center; margin:14px 0 2px;}
  .sub{color:#fff; opacity:.7; text-align:center; font-size:12px; margin-bottom:18px;}
  .card{background:#fff; border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:0 4px 14px rgba(0,0,0,.18);}
  .in{width:100%; font-size:16px; padding:12px; border:2px solid #cbd5e1; border-radius:12px; margin-bottom:10px; font-family:inherit;}
  .btn{width:100%; font-size:16px; font-weight:800; padding:13px; border:none; border-radius:12px; color:#fff;
    background:linear-gradient(135deg,#10b981,#047857); cursor:pointer;}
  .hint{color:#ef4444; font-size:12px; font-weight:800; min-height:16px; margin-bottom:6px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{background:#f0f4f8; color:#627d98; font-size:11px; padding:8px 6px; text-align:right;}
  th:first-child{text-align:left;}
  td{padding:9px 6px; border-top:1px solid #e2e8f0; text-align:right; font-weight:800;}
  td:first-child{text-align:left;}
  .note{font-size:11px; color:#94a3b8; margin-top:10px; line-height:1.6;}
</style>
</head>
<body>
<div id="wrap">
  <h1>📈 学年べつ平均（管理人用）</h1>
  <div class="sub">全家族をまたいだ平均だけを表示します（一人ひとりの記録は出ません）</div>

  <div class="card" id="loginCard">
    <input class="in" id="akey" type="password" placeholder="かんりにんキー" autocomplete="off">
    <div class="hint" id="hint"></div>
    <button class="btn" onclick="load()">ひらく</button>
  </div>

  <div id="result"></div>
</div>

<script>
const CLOUD_URL="https://vcrsoxekorhgcpicexjl.supabase.co";
const CLOUD_KEY="sb_publishable_ZcBgiM-YOdHMnSjd3_xY6w_zoS8f6uE";
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
async function rpc(fn, args){
  const res=await fetch(CLOUD_URL+"/rest/v1/rpc/"+fn,{
    method:"POST",
    headers:{"Content-Type":"application/json","apikey":CLOUD_KEY,"Authorization":"Bearer "+CLOUD_KEY},
    body:JSON.stringify(args)});
  if(!res.ok) throw new Error(fn+" "+res.status);
  const t=await res.text();
  return t?JSON.parse(t):null;
}
async function load(){
  const key=document.getElementById("akey").value.trim();
  const hint=document.getElementById("hint");
  if(!key){ hint.textContent="かんりにんキーを 入れてください"; return; }
  hint.textContent="よみこみ中…";
  let rows=null;
  try{ rows=await rpc("sq_stats_grade",{p_key:key}); }
  catch(e){ hint.textContent="つながりませんでした（電波・設定をご確認ください）"; return; }
  if(rows===null){ hint.textContent="かんりにんキーが ちがいます"; return; }
  hint.textContent="";
  render(rows);
}
function render(rows){
  const out=document.getElementById("result");
  if(!rows.length){ out.innerHTML='<div class="card">まだ 倉庫にデータがありません。だれかが遊んで保存されると、ここに集計が出ます。</div>'; return; }
  const tr=rows.map(r=>`<tr>
    <td>${esc(r.grade)}年生</td>
    <td>${esc(r.players)}人</td>
    <td>${r.avg_mins===null?"−":esc(r.avg_mins)+"分"}</td>
    <td>${r.avg_n===null?"−":esc(r.avg_n)+"問"}</td>
    <td>${r.acc===null?"−":esc(r.acc)+"%"}</td>
  </tr>`).join("");
  out.innerHTML=`<div class="card">
    <table>
      <tr><th>学年</th><th>人数</th><th>1日あたりの時間</th><th>1日あたりの問題数</th><th>正解率</th></tr>
      ${tr}
    </table>
    <div class="note">「1日あたり」は 遊んだ日だけで割った平均（分／問題数）。
    人数が少ないうちは平均が1人の記録に近くなります。
    この画面は全家族の平均だけを扱い、個別の子の記録は取得しません。</div>
  </div>`;
}
document.getElementById("akey").addEventListener("keydown",e=>{ if(e.key==="Enter") load(); });
</script>
</body>
</html>
